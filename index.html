<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Nhu Huy portfolio - Data Analyst and MSc Business Analytics profile.">
    <title>Nhu Huy | Data Analyst</title>
    <link rel="stylesheet" href="styles/base.css?v=3">
    <link rel="stylesheet" href="styles/hero.css?v=3">
    <link rel="stylesheet" href="styles/components.css?v=3">
  </head>
  <body>
    <a class="skip-link" href="#portfolio" data-render="skip-link">Skip to portfolio</a>

    <header class="intro-hero" id="intro">
      <div class="aurora-field" aria-hidden="true">
        <span class="aurora-ribbon aurora-ribbon--one"></span>
        <span class="aurora-ribbon aurora-ribbon--two"></span>
        <span class="aurora-ribbon aurora-ribbon--three"></span>
      </div>

      <div class="hero-content" data-render="hero" data-reveal></div>

      <a class="hero-down" href="#portfolio" aria-label="Scroll to portfolio">
        <span aria-hidden="true"></span>
      </a>
    </header>

    <main class="site-shell" id="portfolio">
      <nav class="site-nav" aria-label="Portfolio navigation" data-render="nav"></nav>

      <div class="portfolio-layout">
        <aside class="profile-card elevated-card" data-render="profile" data-reveal></aside>

        <div class="content-column">
          <section class="section-panel" id="about" data-render="about" data-reveal></section>
          <section class="section-panel" id="skills" data-render="skills"></section>
          <section class="section-panel" id="soft-skills" data-render="soft-skills"></section>
          <section class="section-panel" id="projects" data-render="projects"></section>
        </div>
      </div>
    </main>

    <script type="module" src="scripts/main.js?v=5"></script>
  </body>
</html>
